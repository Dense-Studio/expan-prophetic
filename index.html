
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EXPAN Prophetic - Onboarding</title>
  <meta name="description" content="Join the EXPAN Prophetic community. Register for our upcoming services and events." />
  <meta name="theme-color" content="#020617" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
  
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#e11d48",
            "primary-light": "#fb7185",
            "primary-dark": "#9f1239",
            accent: "#FDA4AF",
            "accent-warm": "#F59E0B",
            surface: "#0f172a",
            "surface-light": "#1e293b",
            "bg-deep": "#020617",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
            serif: ["'Playfair Display'", "serif"],
          },
          borderRadius: {
            DEFAULT: "0.75rem",
            lg: "1rem",
            xl: "1.25rem",
            "2xl": "1.5rem",
            full: "9999px",
          },
          animation: {
            "fade-up": "fadeUp 0.6s ease-out forwards",
            "fade-in": "fadeIn 0.5s ease-out forwards",
            "slide-up": "slideUp 0.5s ease-out forwards",
            "pulse-soft": "pulseSoft 3s ease-in-out infinite",
            shimmer: "shimmer 2s linear infinite",
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            fadeIn: {
              "0%": { opacity: "0" },
              "100%": { opacity: "1" },
            },
            slideUp: {
              "0%": { opacity: "0", transform: "translateY(40px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            pulseSoft: {
              "0%, 100%": { opacity: "0.4" },
              "50%": { opacity: "0.8" },
            },
            shimmer: {
              "0%": { backgroundPosition: "-200% 0" },
              "100%": { backgroundPosition: "200% 0" },
            },
          },
        },
      },
    };
  </script>
  <style>
    .bg-gradient-church {
      background: linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 40%,
        #4c0519 100%
      );
    }
    .bg-gradient-radial {
      background:
        radial-gradient(
          ellipse at 50% 0%,
          rgba(225, 29, 72, 0.15) 0%,
          transparent 60%
        ),
        radial-gradient(
          ellipse at 80% 100%,
          rgba(159, 18, 57, 0.1) 0%,
          transparent 50%
        );
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-input {
      background: rgba(15, 23, 42, 0.9) !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .text-gradient {
      background: linear-gradient(
        135deg,
        #fda4af 0%,
        #e11d48 50%,
        #fb7185 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-glow {
      box-shadow:
        0 0 20px rgba(225, 29, 72, 0.3),
        0 4px 15px rgba(159, 18, 57, 0.4);
    }
    .btn-glow:hover {
      box-shadow:
        0 0 30px rgba(225, 29, 72, 0.5),
        0 8px 25px rgba(159, 18, 57, 0.5);
    }
    .photo-ring {
      background: conic-gradient(
        from 0deg,
        #e11d48,
        #fb7185,
        #fda4af,
        #e11d48
      );
      padding: 3px;
    }
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    * {
      -webkit-tap-highlight-color: transparent;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4"
    }
  }
  </script>
</head>
<body class="bg-bg-deep font-display">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
